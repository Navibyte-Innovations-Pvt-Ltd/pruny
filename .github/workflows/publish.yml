name: Publish to npm and GitHub Packages

on:
  push:
    branches:
      - main
  # Allow manual trigger
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Semantic Release
        if: github.event_name == 'push'
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- GitHub Packages Publishing ---

      - name: Setup Node.js (GitHub Packages)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@navibyte-innovations-pvt-ltd"

      - name: Publish to GitHub Packages
        run: |
          # GH Packages requires the scope to match the repo owner.
          # Rename to @navibyte-innovations-pvt-ltd/pruny just for this step.
          jq '.name = "@navibyte-innovations-pvt-ltd/pruny"' package.json > package.json.tmp && mv package.json.tmp package.json

          npm publish --access public

          # Revert so subsequent steps / local builds see the original name.
          jq '.name = "pruny"' package.json > package.json.tmp && mv package.json.tmp package.json
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}
